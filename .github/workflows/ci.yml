name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # Allows manual runs from GitHub Actions tab


jobs:
  test-dotnet:
    name: Build and Test (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/ServerTests/ServerTests.csproj

      - name: Build
        run: dotnet build src/ServerTests/ServerTests.csproj --no-restore --configuration Release

      - name: Run tests
        run: ./src/ServerTests/bin/Release/net10.0/ServerTests

  lint-typescript:
    name: Lint and Build (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: src/Client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/Client

      - name: Compile TypeScript
        run: npm run compile
        working-directory: src/Client

  package-vsix:
    name: Build VSIX Package
    runs-on: ubuntu-latest
    needs: [test-dotnet, lint-typescript]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: src/Client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/Client

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build VSIX package
        run: npm run package
        working-directory: src/Client

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kusto-explorer-vsix
          path: src/Client/*.vsix
          retention-days: 30
